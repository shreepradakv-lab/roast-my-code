<!DOCTYPE html>
<html>
<head>
  <title>Code Therapist AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 Code Therapist AI</h1>

<textarea id="codeInput" placeholder="Paste your code..."></textarea>

<br><br>

<label>Roast Intensity:</label>
<input type="range" id="intensity" min="1" max="3" value="1">

<p id="level">Friendly 😌</p>

<button onclick="startRoast()">Roast My Code</button>

<div id="loading"></div>
<div id="output"></div>

<!-- AUDIO -->
<audio id="sound"></audio>

<script src="script.js"></script>

</body>
</html>
